name: Release Packages

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}

jobs:
  windows:
    name: Build Windows ${{ matrix.rid }}
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}\.vcpkg
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            triplet: x64-windows

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}\downloads
            ${{ env.VCPKG_ROOT }}\installed
            ${{ env.VCPKG_ROOT }}\buildtrees
            ${{ env.VCPKG_ROOT }}\packages
          key: ${{ runner.os }}-${{ matrix.triplet }}-vcpkg-freerdp-${{ hashFiles('tools/build-rdp-bridge.ps1', 'native/CxRdpBridge/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.triplet }}-vcpkg-freerdp-

      - name: Publish app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rid = "${{ matrix.rid }}"
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\publish\$rid"

          dotnet publish CxShell.csproj `
            -c Release `
            -r $rid `
            --self-contained true `
            -o $publishDir `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:DebugType=none `
            /p:DebugSymbols=false

      - name: Build RDP bridge
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rid = "${{ matrix.rid }}"
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\publish\$rid"

          tools\build-rdp-bridge.ps1 `
            -VcpkgRoot $env:VCPKG_ROOT `
            -Triplet "${{ matrix.triplet }}" `
            -OutputDir $publishDir

      - name: Validate RDP bridge
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rid = "${{ matrix.rid }}"
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\publish\$rid"
          $bridgePath = Join-Path $publishDir "CxRdpBridge.dll"

          if (!(Test-Path $bridgePath)) {
            throw "CxRdpBridge.dll was not copied to $publishDir"
          }

          Add-Type -TypeDefinition @"
          using System;
          using System.Runtime.InteropServices;

          public static class NativeLoadProbe
          {
              public static IntPtr Load(string path) => NativeLibrary.Load(path);
              public static void Free(IntPtr handle) => NativeLibrary.Free(handle);
          }
          "@

          try {
            $handle = [NativeLoadProbe]::Load($bridgePath)
            [NativeLoadProbe]::Free($handle)
            Write-Host "Loaded $bridgePath successfully."
          }
          catch {
            Write-Host "Native files in package:"
            Get-ChildItem $publishDir -Filter "*.dll" | Select-Object Name, Length | Format-Table -AutoSize
            throw
          }

      - name: Create archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rid = "${{ matrix.rid }}"
          $packageName = "CxShell-$($env:RELEASE_TAG)-$rid"
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE "artifacts\package"
          $packageDir = Join-Path $packageRoot $packageName
          $archivePath = Join-Path $env:GITHUB_WORKSPACE "artifacts\$packageName.zip"

          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item -Path "artifacts\publish\$rid\*" -Destination $packageDir -Recurse -Force
          Copy-Item -Path LICENSE,NOTICE,README.md,README.zh-CN.md -Destination $packageDir -Force
          Get-ChildItem -Path $packageDir -Recurse -Filter "*.pdb" | Remove-Item -Force
          Compress-Archive -Path $packageDir -DestinationPath $archivePath -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: CxShell-${{ env.RELEASE_TAG }}-${{ matrix.rid }}
          path: artifacts/CxShell-${{ env.RELEASE_TAG }}-${{ matrix.rid }}.zip
          if-no-files-found: error

  linux:
    name: Build Linux ${{ matrix.rid }}
    runs-on: ${{ matrix.runs_on }}
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            triplet: x64-linux
            runs_on: ubuntu-latest
          - rid: linux-arm64
            triplet: arm64-linux
            runs_on: ubuntu-24.04-arm

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/buildtrees
            ${{ env.VCPKG_ROOT }}/packages
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.triplet }}-vcpkg-freerdp-${{ hashFiles('tools/build-rdp-bridge.sh', 'native/CxRdpBridge/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ matrix.triplet }}-vcpkg-freerdp-

      - name: Publish app
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"
          publish_dir="$GITHUB_WORKSPACE/artifacts/publish/$rid"

          dotnet publish CxShell.csproj \
            -c Release \
            -r "$rid" \
            --self-contained true \
            -o "$publish_dir" \
            /p:PublishSingleFile=true \
            /p:IncludeNativeLibrariesForSelfExtract=true \
            /p:DebugType=none \
            /p:DebugSymbols=false

          if [ -f "$publish_dir/CxShell" ]; then
            chmod +x "$publish_dir/CxShell"
          fi

      - name: Build RDP bridge
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"
          export OUTPUT_DIR="$GITHUB_WORKSPACE/artifacts/publish/$rid"
          export TRIPLET="${{ matrix.triplet }}"
          bash tools/build-rdp-bridge.sh

      - name: Validate RDP bridge
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"
          publish_dir="$GITHUB_WORKSPACE/artifacts/publish/$rid"
          test -f "$publish_dir/libCxRdpBridge.so"
          ldd "$publish_dir/libCxRdpBridge.so"
          if ldd "$publish_dir/libCxRdpBridge.so" | grep -q "not found"; then
            echo "libCxRdpBridge.so has unresolved native dependencies." >&2
            exit 1
          fi

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"
          package_name="CxShell-$RELEASE_TAG-$rid"
          package_root="$GITHUB_WORKSPACE/artifacts/package"
          package_dir="$package_root/$package_name"

          mkdir -p "$package_dir"
          cp -a "$GITHUB_WORKSPACE/artifacts/publish/$rid/." "$package_dir/"
          cp LICENSE NOTICE README.md README.zh-CN.md "$package_dir/"
          find "$package_dir" -name "*.pdb" -delete
          tar -czf "$GITHUB_WORKSPACE/artifacts/$package_name.tar.gz" -C "$package_root" "$package_name"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: CxShell-${{ env.RELEASE_TAG }}-${{ matrix.rid }}
          path: artifacts/CxShell-${{ env.RELEASE_TAG }}-${{ matrix.rid }}.tar.gz
          if-no-files-found: error

  macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: macos-14
            rid: osx-arm64
            triplet: arm64-osx
            arch: arm64
            package_suffix: macos-arm64
          - runs_on: macos-15-intel
            rid: osx-x64
            triplet: x64-osx
            arch: x64
            package_suffix: macos-x64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install build tools
        shell: bash
        run: |
          brew install cmake ninja pkg-config

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/buildtrees
            ${{ env.VCPKG_ROOT }}/packages
          key: ${{ runner.os }}-${{ matrix.triplet }}-vcpkg-freerdp-${{ hashFiles('tools/build-rdp-bridge.sh', 'native/CxRdpBridge/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.triplet }}-vcpkg-freerdp-

      - name: Publish app
        shell: bash
        run: |
          set -euo pipefail
          dotnet publish CxShell.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -o "artifacts/publish/${{ matrix.rid }}" \
            /p:PublishSingleFile=false \
            /p:DebugType=none \
            /p:DebugSymbols=false

      - name: Create app bundle
        shell: bash
        run: |
          set -euo pipefail
          package_name="CxShell-$RELEASE_TAG-${{ matrix.package_suffix }}"
          export PUBLISH_DIR="$GITHUB_WORKSPACE/artifacts/publish/${{ matrix.rid }}"
          export ARTIFACT_DIR="$GITHUB_WORKSPACE/artifacts/package/$package_name"
          export ARCH="${{ matrix.arch }}"
          export BUNDLE_VERSION="${RELEASE_TAG#v}"
          export BUNDLE_SHORT_VERSION="${RELEASE_TAG#v}"

          bash tools/package-macos-app.sh
          cp LICENSE NOTICE README.md README.zh-CN.md "$ARTIFACT_DIR/"
          find "$ARTIFACT_DIR" -name "*.pdb" -delete

      - name: Build RDP bridge
        shell: bash
        run: |
          set -euo pipefail
          package_name="CxShell-$RELEASE_TAG-${{ matrix.package_suffix }}"
          export OUTPUT_DIR="$GITHUB_WORKSPACE/artifacts/package/$package_name/CxShell.app/Contents/MacOS"
          export TRIPLET="${{ matrix.triplet }}"
          bash tools/build-rdp-bridge.sh

      - name: Ad-hoc sign app
        shell: bash
        run: |
          package_name="CxShell-$RELEASE_TAG-${{ matrix.package_suffix }}"
          codesign --force --deep --sign - "artifacts/package/$package_name/CxShell.app"

      - name: Validate package
        shell: bash
        run: |
          set -euo pipefail
          package_name="CxShell-$RELEASE_TAG-${{ matrix.package_suffix }}"
          app_path="artifacts/package/$package_name/CxShell.app"

          test -x "$app_path/Contents/MacOS/CxShell"
          test -f "$app_path/Contents/Info.plist"
          test -f "$app_path/Contents/MacOS/libCxRdpBridge.dylib"

          if [ -d "$app_path/Contents/MacOS/runtimes/win-x64" ]; then
            echo "Windows native runtime files were copied into the macOS package." >&2
            exit 1
          fi

          otool -L "$app_path/Contents/MacOS/libCxRdpBridge.dylib"

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail
          package_name="CxShell-$RELEASE_TAG-${{ matrix.package_suffix }}"
          tar -czf "artifacts/$package_name.tar.gz" -C artifacts/package "$package_name"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: CxShell-${{ env.RELEASE_TAG }}-${{ matrix.package_suffix }}
          path: artifacts/CxShell-${{ env.RELEASE_TAG }}-${{ matrix.package_suffix }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - windows
      - linux
      - macos
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: |
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          notes="Automated CxShell packages for Windows, macOS, and Linux."

          shopt -s nullglob
          assets=(release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --repo "$GH_REPO" --clobber
          else
            create_args=(
              --title "CxShell $tag"
              --notes "$notes"
            )

            if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
              create_args+=(--verify-tag)
            else
              create_args+=(--target "$GITHUB_SHA")
            fi

            gh release create "$tag" "${assets[@]}" --repo "$GH_REPO" "${create_args[@]}"
          fi
